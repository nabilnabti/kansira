<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Rounded orange background -->
  <rect width="64" height="64" rx="14" fill="#FF6B00"/>

  <!-- Body / Head -->
  <ellipse cx="32" cy="37" rx="20" ry="20" fill="#FF8C3A"/>
  <ellipse cx="32" cy="38" rx="14" ry="12" fill="#FFB366" opacity="0.5"/>

  <!-- Kufi cap -->
  <path d="M14 20 Q14 12 22 10 L42 10 Q50 12 50 20 Z" fill="#2D9F4F"/>
  <ellipse cx="32" cy="20" rx="18" ry="3.5" fill="#248A40"/>
  <line x1="20" y1="11" x2="20" y2="20" stroke="#1B7A38" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="26" y1="10.5" x2="26" y2="20" stroke="#1B7A38" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="32" y1="10" x2="32" y2="20" stroke="#1B7A38" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="38" y1="10.5" x2="38" y2="20" stroke="#1B7A38" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="44" y1="11" x2="44" y2="20" stroke="#1B7A38" stroke-width="1.2" stroke-linecap="round"/>

  <!-- Eyes -->
  <ellipse cx="24" cy="33" rx="7" ry="7.5" fill="white"/>
  <ellipse cx="40" cy="33" rx="7" ry="7.5" fill="white"/>
  <circle cx="24" cy="34.5" r="4" fill="#1A1A2E"/>
  <circle cx="40" cy="34.5" r="4" fill="#1A1A2E"/>
  <circle cx="26" cy="32.5" r="2" fill="white"/>
  <circle cx="42" cy="32.5" r="2" fill="white"/>

  <!-- Beak -->
  <path d="M28 43 L32 50 L36 43 Z" fill="#FFB800"/>
  <path d="M30 43 L32 48.5 L34 43 Z" fill="#FFD54F"/>

  <!-- Smile -->
  <path d="M27 52 Q32 57 37 52" stroke="#D04E00" stroke-width="1.8" stroke-linecap="round" fill="none"/>

  <!-- Small wing hints -->
  <ellipse cx="12" cy="42" rx="5" ry="8" fill="#2D9F4F" opacity="0.6" transform="rotate(-15 12 42)"/>
  <ellipse cx="52" cy="42" rx="5" ry="8" fill="#2D9F4F" opacity="0.6" transform="rotate(15 52 42)"/>
</svg>
